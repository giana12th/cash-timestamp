name: Release VSIX

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - run: npm ci

      - run: npx @vscode/vsce package

      - uses: softprops/action-gh-release@v3
        with:
          files: "*.vsix"
          generate_release_notes: true
